random_state: 44
paths:
  raw_frequency_csv: data/raw/run_3_frequencies.csv
  raw_eh_csv: data/raw/run_3_e_h_fields.csv
  xlsx_path: data/alternate/Mode1.xlsx
  processed_csv: data/processed/cavity_dataset.csv
  splits_json: artifacts/splits/split_indices.json
  metrics_json: artifacts/metrics/metrics.test.json
  metrics_csv: artifacts/metrics/metrics.test.csv
  report_md: reports/experiment_report.test.md
  best_metadata_json: artifacts/models/best_model_metadata.test.json
split:
  test_size: 0.2
  val_size: 0.1
  stratify_radius: true
acceptance:
  legacy_radius_accuracy: 0.84
  legacy_height_r2: 0.80
models:
  random_forest_n_estimators: 80
  extra_trees_n_estimators: 120
  multioutput_extra_trees_n_estimators: 160
  knn_neighbors: 6
  torch:
    batch_size: 256
    radius_epochs: 10
    height_epochs: 10
    learning_rate: 0.003
    weight_decay: 0.0001
    radius_hidden: [128, 64]
    height_hidden: [128, 64]
selection:
  runtime_penalty: 0.002
