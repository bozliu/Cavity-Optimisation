name: CI

on:
  push:
  pull_request:

jobs:
  lint-test-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[test]
          pip install ruff

      - name: Reconstruct toy data
        run: |
          python scripts/reconstruct_data.py --config configs/lightweight_test.yaml --profile toy

      - name: Lint
        run: |
          ruff check .

      - name: Tests
        run: |
          pytest -q

      - name: CLI smoke
        run: |
          python -m cavity_ml --help
          python -m cavity_ml prepare-data --help
          python -m cavity_ml validate-data --help
          python -m cavity_ml predict --help

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
